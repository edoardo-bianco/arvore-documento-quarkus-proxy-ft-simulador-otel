quarkus.application.name=arvore-documento-test

# Testes unitarios nao devem depender de rede, API Manager, OIDC real ou backend de observabilidade.
simtr.apikey=test-apikey

quarkus.rest-client.parametrizacao-processo.url=http://localhost:1
quarkus.rest-client.parametrizacao-processo.connect-timeout=100
quarkus.rest-client.parametrizacao-processo.read-timeout=100

quarkus.rest-client.parametrizacao-checklist.url=http://localhost:1
quarkus.rest-client.parametrizacao-checklist.connect-timeout=100
quarkus.rest-client.parametrizacao-checklist.read-timeout=100

quarkus.rest-client.dossie-produto.url=http://localhost:1
quarkus.rest-client.dossie-produto.connect-timeout=100
quarkus.rest-client.dossie-produto.read-timeout=100

arvore-documento.simulador.parametrizacao-processo.habilitado=true
arvore-documento.simulador.parametrizacao-checklist.habilitado=true
arvore-documento.simulador.dossie-produto.habilitado=true

quarkus.oidc.enabled=false
quarkus.oidc-client.enabled=false
quarkus.oidc-client.auth-server-url=http://localhost:1/auth/realms/test
quarkus.oidc-client.discovery-enabled=false
quarkus.oidc-client.token-path=/protocol/openid-connect/token
quarkus.oidc-client.client-id=test-client
quarkus.oidc-client.credentials.client-secret.value=test-secret
quarkus.oidc-client.connection-timeout=PT0.1S
quarkus.oidc-client.connection-retry-count=0
quarkus.oidc-client.grant.type=CLIENT

quarkus.otel.traces.exporter=none
quarkus.otel.logs.enabled=false
quarkus.otel.logs.handler.enabled=false
quarkus.otel.logs.exporter=none

arvore-documento.observabilidade.rest-client.payload.habilitado=false

quarkus.log.file.enabled=false
quarkus.log.console.json.enabled=false

quarkus.jacoco.report=true
quarkus.jacoco.report-location=target/jacoco-report
quarkus.jacoco.title=arvore-documento
