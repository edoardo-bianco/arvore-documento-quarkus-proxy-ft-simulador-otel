# Quarkus configuration property
quarkus:
  jackson:
    timezone: America/Sao_Paulo
  banner:
    enabled: false
  http:
    cors: true
    # HTTP root path. All web content will be served relative to this root path.
    root-path: /simtr-hub-outsourcing
    # A common root path for non-application endpoints. Various extension-provided endpoints such as metrics, health, and openapi are deployed under this path by default.
    non-application-root-path: /simtr-hub-outsourcing
    port: 8090
    test-port: 8083
    test-ssl-port: 8446

# Logging configuration property 
  log:
    min-level: INFO
    level: INFO
    file:
      enable: false
      rotation:
        max-file-size: 10M
        max-backup-index: 100
        file-suffix: .yyyy-MM-dd
        rotate-on-boot: true
    category:
      "br.gov.caixa.simtr":
        level: INFO  

 # Datasource configuration property   
  datasource:
    db-kind: oracle  
    jdbc:
      driver: oracle.jdbc.driver.OracleDriver
      url: jdbc:oracle:thin:@//cnpexdadvm01-scan4.extra.caixa.gov.br:1521/cdbd08ngpdb007
      initial-size: 0
      min-size: 0
      max-size: 20 
      #initial-size: ${QUARKUS_DATASOURCE_JDBC_INITIAL_SIZE}
      #min-size: ${QUARKUS_DATASOURCE_JDBC_MIN_SIZE}
      #max-size: ${QUARKUS_DATASOURCE_JDBC_MAX_SIZE}
    username: mtr
    password: ${SIMTR_DB_PASSWORD}
    devservices:
      enabled: false    
  hibernate-orm:
    dialect: org.hibernate.dialect.OracleDialect
    database:
      generation: validate
    log:
      sql: false
    unsupported-properties:
      "hibernate.query.mutation_strategy": org.hibernate.query.sqm.mutation.internal.inline.InlineMutationStrategy
      "hibernate.hql.bulk_id_strategy.global_temporary.create_tables": false
      "hibernate.hql.bulk_id_strategy.global_temporary.drop_tables": false
  transaction-manager:
    default-transaction-timeout: PT2M  

#Swagger UI
  swagger-ui:
    always-include: true
    path: /simtr-hub-outsourcing/doc
    default-models-expand-depth: -1

#SmallRye OpenAPI
  smallrye-openapi:
    info-version: ${quarkus.application.version}

  tls:
    trust-all: true

#OpenID Connect
  oidc:
    authentication:
     verify-access-token: true  
    public-key: 
    auth-server-url: https://login.des.caixa/auth/realms/intranet
    client-id: cli-ser-mtr
    credentials:
      secret: ${SIMTR_OIDC_CLIENT_SECRET}
    internet:
      public-key: 
      auth-server-url: ${QUARKUS_OIDC_INTERNET_AUTH_SERVER_URL}
      client-id: ${QUARKUS_OIDC_INTERNET_CLIENT_ID}
      credentials:
        secret: ${SIMTR_OIDC_INTERNET_CLIENT_SECRET}

#OpenID Connect Client
  oidc-client:
    auth-server-url: ${quarkus.oidc.auth-server-url}
    tls:
      verification: none
    discovery-enabled: false
    token-path: /protocol/openid-connect/token
    client-id: ${quarkus.oidc.client-id}
    credentials:
      client-secret:
        value: ${quarkus.oidc.credentials.secret}
    connection-timeout: PT15S
    connection-retry-count: 3
    connection-delay: PT20S         
    grant:
      type: CLIENT

# Rest Client configuration property    
  rest-client:
    #Global Configuration
    connect-timeout: ${simtr.http.establishconnectiontimeout}
    read-timeout: ${simtr.http.sockettimeout}
    #Client Specific Configuration
    siecm-api:
      url:  ${quarkus.rest.client.siecm.api.url}
      scope: jakarta.enterprise.context.ApplicationScoped
      connection-pool-size: 5
      connect-timeout: ${simtr.http.establishconnectiontimeout}
      read-timeout: ${simtr.http.sockettimeout}
      proxy-address: none
    cadastro-receita:
      url: ${quarkus.rest.client.cadastro.receita.api.url}
      scope: jakarta.enterprise.context.ApplicationScoped
      connection-pool-size: 5
      connect-timeout: ${simtr.http.establishconnectiontimeout}
      read-timeout: ${simtr.http.sockettimeout}
      proxy-address: none
    sinda-api:
      url: https://api.des.caixa:8443
      scope: jakarta.enterprise.context.ApplicationScoped
      connection-pool-size: 15
      connect-timeout: 15000
      read-timeout: 90000
      proxy-address: none
    #logging:
    #  scope: request-response
    #  body-limit: 500    

  # JWT RBAC behavior configuration property
  security:
    jaxrs:
      deny-unannotated-endpoints: false
    deny-unannotated-members: false  
  
  # Smallrye health configuration property
  smallrye-health:
    ui:
      enable: true

  #  Jacoco report Configuration property
  jacoco:
    report: true
    #title: 
    #includes: **
    excludes: "src/main/java/br/gov/caixa/simtr/mapeamento/**/*, src/test/java/**/*, src/main/java/br/gov/caixa/simtr/excecao/**/*"
    report-location: "jacoco-report"

