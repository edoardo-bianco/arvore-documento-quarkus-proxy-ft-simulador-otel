#SIMTR  configuration property
simtr:
  simulador:
    canal: false
    sinda: false
    fornecedor-envio: false
  http:
    establishconnectiontimeout: 15000
    sockettimeout: 30000
  apikey: ${SIMTR_API_KEY}
  documento:
    validacao:
      limite-score-autenticidade: 71
  sinda:
    canal: 61
  proxy:
    https:
      host: proxydes.caixa
      port: 80
      schema: http
    http:
      host: proxydes.caixa
      port: 80
      schema: http 
  atualiza-tipo-documento:
    every:
      expr: 180s
# Envia Documentos Dossie Produto configuration property
  envia-documentos-dossie-produto:
    rotina-ativa: false
    maximo-retries: 3
    every:
      expr: 10m
  atualiza-canal:
    every:
      expr: 180s
  atualiza-etapa:
    every:
      expr: 180s
  log-filtro:
    body-limit: 1000
    req[0]: binario
    req[1]: sas
    res[0]: binario
    res[1]: sas
    client-req[0]: binario
    client-res[0]: binario
  feature:
    usa-novos-campos:
      identidade-fiscal: true
