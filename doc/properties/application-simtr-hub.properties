# Converted from doc/properties/application-simtr-hub.yml

# Quarkus configuration property
quarkus.jackson.timezone=America/Sao_Paulo
quarkus.banner.enabled=false
quarkus.http.cors=true
quarkus.http.root-path=/simtr-hub-outsourcing
quarkus.http.non-application-root-path=/simtr-hub-outsourcing
quarkus.http.port=8090
quarkus.http.test-port=8083
quarkus.http.test-ssl-port=8446

# Logging configuration property
quarkus.log.min-level=INFO
quarkus.log.level=INFO
quarkus.log.file.enable=false
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=100
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd
quarkus.log.file.rotation.rotate-on-boot=true
quarkus.log.category."br.gov.caixa.simtr".level=INFO

# Datasource configuration property
quarkus.datasource.db-kind=oracle
quarkus.datasource.jdbc.driver=oracle.jdbc.driver.OracleDriver
quarkus.datasource.jdbc.url=jdbc:oracle:thin:@//cnpexdadvm01-scan4.extra.caixa.gov.br:1521/cdbd08ngpdb007
quarkus.datasource.jdbc.initial-size=0
quarkus.datasource.jdbc.min-size=0
quarkus.datasource.jdbc.max-size=20
quarkus.datasource.username=mtr
quarkus.datasource.password=${SIMTR_DB_PASSWORD}
quarkus.datasource.devservices.enabled=false

quarkus.hibernate-orm.dialect=org.hibernate.dialect.OracleDialect
quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.log.sql=false
quarkus.hibernate-orm.unsupported-properties."hibernate.query.mutation_strategy"=org.hibernate.query.sqm.mutation.internal.inline.InlineMutationStrategy
quarkus.hibernate-orm.unsupported-properties."hibernate.hql.bulk_id_strategy.global_temporary.create_tables"=false
quarkus.hibernate-orm.unsupported-properties."hibernate.hql.bulk_id_strategy.global_temporary.drop_tables"=false

quarkus.transaction-manager.default-transaction-timeout=PT2M

# Swagger UI
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/simtr-hub-outsourcing/doc
quarkus.swagger-ui.default-models-expand-depth=-1

# SmallRye OpenAPI
quarkus.smallrye-openapi.info-version=${quarkus.application.version}

quarkus.tls.trust-all=true

# OpenID Connect
quarkus.oidc.authentication.verify-access-token=true
quarkus.oidc.public-
quarkus.oidc.auth-server-url=https://login.des.caixa/auth/realms/intranet
quarkus.oidc.client-id=cli-ser-mtr
quarkus.oidc.credentials.secret=${SIMTR_OIDC_CLIENT_SECRET}
quarkus.oidc.internet.public-
quarkus.oidc.internet.auth-server-url=${QUARKUS_OIDC_INTERNET_AUTH_SERVER_URL}
quarkus.oidc.internet.client-id=${QUARKUS_OIDC_INTERNET_CLIENT_ID}
quarkus.oidc.internet.credentials.secret=${SIMTR_OIDC_INTERNET_CLIENT_SECRET}

# OpenID Connect Client
quarkus.oidc-client.auth-server-url=${quarkus.oidc.auth-server-url}
quarkus.oidc-client.tls.verification=none
quarkus.oidc-client.discovery-enabled=false
quarkus.oidc-client.token-path=/protocol/openid-connect/token
quarkus.oidc-client.client-id=${quarkus.oidc.client-id}
quarkus.oidc-client.credentials.client-secret.value=${quarkus.oidc.credentials.secret}
quarkus.oidc-client.connection-timeout=PT15S
quarkus.oidc-client.connection-retry-count=3
quarkus.oidc-client.connection-delay=PT20S
quarkus.oidc-client.grant.type=CLIENT

# Rest Client configuration property
quarkus.rest-client.connect-timeout=${simtr.http.establishconnectiontimeout}
quarkus.rest-client.read-timeout=${simtr.http.sockettimeout}
quarkus.rest-client.siecm-api.url=${QUARKUS_REST_CLIENT_SIECM_API_URL}
quarkus.rest-client.siecm-api.scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client.siecm-api.connection-pool-size=5
quarkus.rest-client.siecm-api.connect-timeout=${simtr.http.establishconnectiontimeout}
quarkus.rest-client.siecm-api.read-timeout=${simtr.http.sockettimeout}
quarkus.rest-client.siecm-api.proxy-address=none
quarkus.rest-client.cadastro-receita.url=${QUARKUS_REST_CLIENT_CADASTRO_RECEITA_API_URL}
quarkus.rest-client.cadastro-receita.scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client.cadastro-receita.connection-pool-size=5
quarkus.rest-client.cadastro-receita.connect-timeout=${simtr.http.establishconnectiontimeout}
quarkus.rest-client.cadastro-receita.read-timeout=${simtr.http.sockettimeout}
quarkus.rest-client.cadastro-receita.proxy-address=none
quarkus.rest-client.sinda-api.url=https://api.des.caixa:8443
quarkus.rest-client.sinda-api.scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client.sinda-api.connection-pool-size=15
quarkus.rest-client.sinda-api.connect-timeout=15000
quarkus.rest-client.sinda-api.read-timeout=90000
quarkus.rest-client.sinda-api.proxy-address=none

# JWT RBAC behavior configuration property
quarkus.security.jaxrs.deny-unannotated-endpoints=false
quarkus.security.deny-unannotated-members=false

# Smallrye health configuration property
quarkus.smallrye-health.ui.enable=true

# Jacoco report Configuration property
quarkus.jacoco.report=true
quarkus.jacoco.excludes=src/main/java/br/gov/caixa/simtr/mapeamento/**/*, src/test/java/**/*, src/main/java/br/gov/caixa/simtr/excecao/**/*
quarkus.jacoco.report-location=jacoco-report

# Azure Configuration property
service-bus-azure-configuracao.http-client-options.connect-timeout=10000
service-bus-azure-configuracao.http-client-options.write-timeout=60000
service-bus-azure-configuracao.http-client-options.response-timeout=60000
service-bus-azure-configuracao.http-client-options.read-timeout=60000
service-bus-azure-configuracao.http-client-options.maximum-connection-pool-size=500
service-bus-azure-configuracao.http-client-options.connection-idle-timeout=60000
service-bus-azure-configuracao.amqp-client-retry-options.max-retries=1
service-bus-azure-configuracao.amqp-client-retry-options.delay=10
service-bus-azure-configuracao.amqp-client-retry-options.max-delay=1000
service-bus-azure-configuracao.amqp-client-retry-options.try-timeout=20000
service-bus-azure-configuracao.amqp-client-retry-options.retry-mode=FIXED
service-bus-azure-configuracao.namespace-configuracao.namespace=dossiedigitaldes
service-bus-azure-configuracao.namespace-configuracao.connection-string=${SIMTR_SERVICE_BUS_CONNECTION_STRING}
service-bus-azure-configuracao.namespace-configuracao.transport-type=Amqp
service-bus-azure-configuracao.namespace-configuracao.queues.process-every.expr=180s

