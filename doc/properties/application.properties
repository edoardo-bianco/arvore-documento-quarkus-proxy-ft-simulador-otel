quarkus.application.name=simtr-hub
quarkus.http.port=8080

# OpenAPI / Swagger UI
quarkus.smallrye-openapi.path=/hub/openapi
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/hub/doc
%dev.quarkus.smallrye-openapi.path=/hub/openapi
%dev.quarkus.swagger-ui.path=/hub/doc

%dev.quarkus.transaction-manager.default-transaction-timeout=PT2M
%dev.quarkus.tls.trust-all=true

# OpenID Connect
%dev.quarkus.oidc.authentication.verify-access-token=true
%dev.quarkus.oidc.public-
%dev.quarkus.oidc.auth-server-url=https://login.des.caixa/auth/realms/intranet
%dev.quarkus.oidc.client-id=cli-ser-mtr
%dev.quarkus.oidc.credentials.secret=${SIMTR_OIDC_CLIENT_SECRET}
%dev.quarkus.oidc.internet.public-
%dev.quarkus.oidc.internet.auth-server-url=https://logindes.caixa.gov.br/auth/realms/internet
%dev.quarkus.oidc.internet.client-id=cli-ser-mtr
%dev.quarkus.oidc.internet.credentials.secret=${SIMTR_OIDC_INTERNET_CLIENT_SECRET}

# OpenID Connect Client
%dev.quarkus.oidc-client.auth-server-url=${%dev.quarkus.oidc.auth-server-url}
%dev.quarkus.oidc-client.tls.verification=none
%dev.quarkus.oidc-client.discovery-enabled=false
%dev.quarkus.oidc-client.token-path=/protocol/openid-connect/token
%dev.quarkus.oidc-client.client-id=${%dev.quarkus.oidc.client-id}
%dev.quarkus.oidc-client.credentials.client-secret.value=${%dev.quarkus.oidc.credentials.secret}
%dev.quarkus.oidc-client.connection-timeout=PT15S
%dev.quarkus.oidc-client.connection-retry-count=3
%dev.quarkus.oidc-client.connection-delay=PT20S
%dev.quarkus.oidc-client.grant.type=CLIENT


# REST Client - MTR Parametrizacao
# Em ambiente real, configurar via variÃ¡vel de ambiente:
# QUARKUS_REST_CLIENT_PARAMETRIZACAO_PROCESSO_URL=https://simtr-parametrizacao-des.apps.nprd.caixa
quarkus.rest-client.parametrizacao-processo.url=https://simtr-parametrizacao-des.apps.nprd.caixa
quarkus.rest-client.parametrizacao-processo.connect-timeout=3000
quarkus.rest-client.parametrizacao-processo.read-timeout=10000

quarkus.rest-client.parametrizacao-checklist.url=https://simtr-parametrizacao-des.apps.nprd.caixa
quarkus.rest-client.parametrizacao-checklist.connect-timeout=3000
quarkus.rest-client.parametrizacao-checklist.read-timeout=10000

# REST Client - MTR Gestao de Documentos
# Em ambiente real, configurar via variavel de ambiente:
# QUARKUS_REST_CLIENT_GESTAO_DOCUMENTO_URL=https://api.des.caixa:8443/simtr
quarkus.rest-client.gestao-documento.url=https://api.des.caixa:8443/simtr
quarkus.rest-client.gestao-documento.connect-timeout=3000
quarkus.rest-client.gestao-documento.read-timeout=10000

# JSON
quarkus.jackson.fail-on-unknown-properties=false
quarkus.jackson.write-dates-as-timestamps=false


# Simulador da integração com o MTR Parametrizacao
# false = chama o REST Client real do MTR
# true  = nao chama o MTR e retorna um DTO mockado
simtr-hub.simulador.parametrizacao-processo.habilitado=false
%dev.simtr-hub.simulador.parametrizacao-processo.habilitado=false
simtr-hub.simulador.parametrizacao-checklist.habilitado=false
%dev.simtr-hub.simulador.parametrizacao-checklist.habilitado=false
simtr-hub.simulador.gestao-documento.habilitado=false
%dev.simtr-hub.simulador.gestao-documento.habilitado=false

# Observabilidade - OpenTelemetry e logs JSON
# Padrao seguro para maquinas sem Docker/Jaeger: nao exporta OpenTelemetry para fora.
# Os logs continuam sendo escritos em JSON no console e no arquivo target/logs/simtr-hub.json.
simtr-hub.observabilidade.rest-client.payload.habilitado=true
simtr-hub.observabilidade.rest-client.payload.input.max-length=2000
simtr-hub.observabilidade.rest-client.payload.output.max-length=4000

quarkus.otel.traces.sampler=always_on
quarkus.otel.traces.sampler.arg=1.0
quarkus.otel.traces.exporter=none
quarkus.otel.logs.enabled=false
quarkus.otel.logs.handler.enabled=false
quarkus.otel.logs.exporter=none

# Profile opcional para Jaeger/OpenTelemetry.
# Use em dev mode quando houver Jaeger/OTLP em localhost:4317:
# mvn quarkus:dev -Ddebug=false "-Dquarkus.profile=dev,jaeger"
# O endpoint OTLP pode ser sobrescrito por ambiente, por exemplo:
# QUARKUS_OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
%jaeger.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%jaeger.quarkus.otel.traces.exporter=cdi
%jaeger.quarkus.otel.logs.enabled=true
%jaeger.quarkus.otel.logs.handler.enabled=true
%jaeger.quarkus.otel.logs.exporter=cdi

# Profile opcional para Grafana/Tempo/Loki via OpenTelemetry Collector.
# Use quando localhost:4317 for um OpenTelemetry Collector.
# mvn quarkus:dev -Ddebug=false "-Dquarkus.profile=dev,grafana"
%grafana.quarkus.otel.exporter.otlp.endpoint=http://localhost:4317
%grafana.quarkus.otel.traces.exporter=cdi
%grafana.quarkus.otel.logs.enabled=true
%grafana.quarkus.otel.logs.handler.enabled=true
%grafana.quarkus.otel.logs.exporter=cdi

# Logs estruturados JSON na console e em arquivo, com MDC achatado para facilitar consulta em agregadores.
quarkus.log.console.json.enabled=true
quarkus.log.console.json.pretty-print=false
quarkus.log.console.json.exception-output-type=formatted
quarkus.log.console.json.mdc.flat-fields=true
quarkus.log.console.json.additional-field."service.name".value=${quarkus.application.name}
quarkus.log.console.json.additional-field."service.name".type=string

quarkus.log.file.enabled=true
quarkus.log.file.path=target/logs/simtr-hub.json
quarkus.log.file.json.enabled=true
quarkus.log.file.json.pretty-print=false
quarkus.log.file.json.exception-output-type=formatted
quarkus.log.file.json.mdc.flat-fields=true
quarkus.log.file.json.additional-field."service.name".value=${quarkus.application.name}
quarkus.log.file.json.additional-field."service.name".type=string
